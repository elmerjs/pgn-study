<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PGN Study</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b1020" />

  <!-- Iconos -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark-theme">
  <div class="app-container">

    <header class="header">
      <div class="app-brand">
        <div class="app-icon">⚖️</div>
        <div>
          <h1 class="app-title">PGN Study</h1>
          <p class="app-subtitle">Procuraduría General de la Nación</p>
        </div>
      </div>

<div class="header-actions">
  <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">🌙</button>
  <div class="progress-summary">
    <span id="progressCount">0/0</span>
    <div class="progress-bar-header">
      <div id="statsBarFill" class="header-progress-fill"></div>
    </div>
  </div>
</div>
    </header>

    <!-- Banner continuar escuchando -->
    <section id="continueBanner" class="continue-banner hidden" aria-label="Continuar escuchando">
      <div class="continue-icon">▶️</div>
      <div class="continue-info">
        <span class="continue-label">Continuar escuchando</span>
        <span id="continueTitle" class="continue-title"></span>
      </div>
      <button id="continueBtn" class="continue-play-btn" aria-label="Continuar reproducción">▶</button>
    </section>

    <!-- Barra de tabs + flecha -->
    <div class="tabs-bar">
      <button class="collapse-btn" aria-label="Mostrar u ocultar filtros">◀</button>
      <div class="tabs">
        <button class="tab-btn active" data-eje="all" role="tab" aria-selected="true">🎓 Todos</button>
        <button class="tab-btn" data-eje="constitucion" role="tab" aria-selected="false">🏛️ Constitución</button>
        <button class="tab-btn" data-eje="estructura" role="tab" aria-selected="false">⚙️ Estructura</button>
        <button class="tab-btn" data-eje="administrativo" role="tab" aria-selected="false">📋 CPACA</button>
        <button class="tab-btn" data-eje="funcional" role="tab" aria-selected="false">💰 Funcional</button>
        <button class="tab-btn" data-eje="estrategia" role="tab" aria-selected="false">🎯 Estrategia</button>
      </div>
    </div>

    <!-- Lista de episodios -->
    <main id="episodesList" class="episodes-list" aria-label="Lista de episodios"></main>

    <!-- Reproductor principal -->
    <section id="player" class="player hidden" aria-label="Reproductor de audio">
      <div class="player-header">
        <div class="player-eje-badge" id="playerEjeBadge"></div>
        <button id="closePlayerBtn" class="close-btn" aria-label="Cerrar reproductor">✕</button>
      </div>

      <div class="artwork">
        <div id="artworkIcon" class="artwork-icon">
          <div class="artwork-emoji" id="artworkEmoji">🎙️</div>
          <div class="artwork-ring ring1"></div>
          <div class="artwork-ring ring2"></div>
          <div class="artwork-ring ring3"></div>
        </div>
      </div>

      <div class="player-meta">
        <h2 id="currentTitle" class="player-title">Título del episodio</h2>
        <p id="currentSubtitulo" class="player-subtitle"></p>
      </div>

      <div id="currentFoco" class="player-focus hidden"></div>

      <div class="progress-container">
        <div class="time-info">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
        <input
          type="range"
          id="progressBar"
          class="progress-bar"
          min="0"
          max="100"
          value="0"
          aria-label="Progreso del audio"
        />
      </div>

      <div class="player-options">
        <div class="speed-controls" role="group" aria-label="Velocidad de reproducción">
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="1.5">1.5×</button>
          <button class="speed-btn" data-speed="2">2×</button>
        </div>
        <button id="sleepTimerBtn" class="option-btn" aria-label="Temporizador de sueño">⏱ Sleep</button>
      </div>

      <div id="waveform" class="waveform" aria-hidden="true">
        <div class="wave-bars" id="waveBars"></div>
      </div>

      <div class="controls">
        <button id="rewindBtn" class="control-btn" aria-label="Retroceder 10 segundos">
          <span class="ctrl-icon">↺</span><span class="ctrl-label">10</span>
        </button>
        <button id="playPauseBtn" class="control-btn play-btn" aria-label="Reproducir o pausar">🎙️</button>
        <button id="forwardBtn" class="control-btn" aria-label="Adelantar 10 segundos">
          <span class="ctrl-icon">↻</span><span class="ctrl-label">10</span>
        </button>
      </div>
    </section>

    <!-- Mini player -->
    <div id="miniPlayer" class="mini-player hidden" role="region" aria-label="Mini reproductor">
      <div id="miniArtwork" class="mini-artwork">🎙️</div>
      <div class="mini-info">
        <span id="miniTitle" class="mini-title"></span>
        <div class="mini-progress-bar">
          <div id="miniProgressFill" class="mini-progress-fill"></div>
        </div>
      </div>
      <button id="miniPlayBtn" class="mini-play-btn" aria-label="Play/Pausa mini">🎙️</button>
      <button id="miniExpandBtn" class="mini-expand-btn" aria-label="Expandir reproductor">∧</button>
    </div>

  </div> <!-- cierre .app-container -->

  <!-- Modal Sleep Timer -->
  <div id="sleepModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Temporizador">
    <div class="modal-box">
      <h3>⏱ Sleep Timer</h3>
      <div class="sleep-options">
        <button class="sleep-opt" data-min="15">15 min</button>
        <button class="sleep-opt" data-min="30">30 min</button>
        <button class="sleep-opt" data-min="45">45 min</button>
        <button class="sleep-opt" data-min="60">1 hora</button>
      </div>
      <button id="cancelSleep" class="cancel-btn">Cancelar</button>
    </div>
  </div>

  <!-- Audio real -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <!-- Lógica principal -->
  <script src="script.js"></script>

  <!-- Registrar Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/pgn-study/sw.js")
        .then(() => console.log("Service Worker registrado"))
        .catch(err => console.log("Error:", err));
    }
  </script>
<!-- Banner PRO alternativo (simple) -->
<div id="proBannerSimple" class="pro-banner-simple" style="display: none;">
  <span>⭐</span>
  <span>¿Necesitas contenido para tu perfil específico?</span>
  <a href="https://wa.me/573001234567?text=Hola%2C%20quiero%20info%20del%20contenido%20PRO%20de%20PGN%20Study" target="_blank">Consultar PRO →</a>
</div>

<style>
.pro-banner-simple {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #1a1a2e;
  border: 1px solid #e6a817;
  border-radius: 16px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: space-between;
  z-index: 200;
  flex-wrap: wrap;
}
.pro-banner-simple a {
  background: #e6a817;
  color: #000;
  padding: 8px 16px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}
</style>

<script>
// Mostrar banner simple después de 5 segundos
setTimeout(() => {
  const banner = document.getElementById('proBannerSimple');
  if (banner) banner.style.display = 'flex';
}, 5000);
</script>
</body>
</html>
